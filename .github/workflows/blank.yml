# .github/workflows/deploy.yml
name: Deploy

on:
  push:
    branches: [ main ]          # запуск по пушам в main
  workflow_dispatch:            # ручной запуск

jobs:
  deploy:
    runs-on: ubuntu-latest      # легковесный раннер с уже установленным ssh-client

    steps:
      # Ваш before_script (без apk, т.к. ssh-client уже есть)
      - name: Setup SSH agent and known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: shop-with-me.ru
        run: |
          eval $(ssh-agent -s)
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      # Ваш script
      - name: Run deploy script
        run: |
          cd shop-with-me && bash deploy.sh
