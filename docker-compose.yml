networks:
  default:
    name: my-shared-net
    external: true

services:
  build_front:
    image: node:22-alpine
    working_dir: /app

    volumes:
      - ./app:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run build"

  nginx:
    image: nginx:alpine
    container_name: shop-with-me-nginx
    volumes:
      - ./app/dist/client:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro


volumes:
  node_modules: